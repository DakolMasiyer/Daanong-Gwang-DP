<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Da'anong Gyang — Director of Photography. Cinematic work spanning documentary, features, and commercial." />
  <title>Da'anong Gyang — DP</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="dns-prefetch" href="https://player.vimeo.com" />

  <!-- Design system + site styles -->
  <link rel="stylesheet" href="DESIGN_SYSTEM.css?v=2" />
  <link rel="stylesheet" href="site.css?v=2" />

  <style>
    /* ============================================================
       index.css — Homepage specific styles
       ============================================================ */


    /* ----------------------------------------------------------
       HERO
    ---------------------------------------------------------- */

    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 260px;
      overflow: hidden;
      background: var(--color-bg);
    }


    /* ----------------------------------------------------------
       WORK PREVIEW SECTION
    ---------------------------------------------------------- */

    .work-preview {
      padding-block: var(--section-gap);
    }

    .work-preview__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-10);
      padding-inline: var(--container-pad);
    }

    .work-preview__label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .work-preview__cta {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: none;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 2px;
      transition: color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
    }

    .work-preview__cta:hover {
      color: var(--color-text);
      border-color: var(--color-text);
    }

    /* Card stack on homepage — full bleed, edge to edge */
    .work-preview .card-stack {
      padding-inline: 0;
    }


    /* ----------------------------------------------------------
       CTA / FOOTER BAND
    ---------------------------------------------------------- */

    .home-cta {
      padding-block: var(--section-gap);
      border-top: 1px solid var(--color-border);
    }

    .home-cta__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-8);
      flex-wrap: wrap;
    }

    .home-cta__text {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      line-height: var(--line-height-tight);
      max-width: none;
    }

    .home-cta__link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: none;
      white-space: nowrap;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .home-cta__link:hover {
      color: var(--color-text);
    }

    .home-cta__link-arrow {
      display: inline-block;
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .home-cta__link:hover .home-cta__link-arrow {
      transform: translateX(4px);
    }

    @media (max-width: 767px) {
      .home-cta__text {
        font-size: var(--font-size-md);
      }
    }
  </style>
</head>

<body>

  <!-- ============================================================
       SITE HEADER
  ============================================================ -->
  <header class="site-header" role="banner">
    <a href="index.html" class="site-logo" aria-label="Da'anong Gyang — Home">
      Da'anong Gyang&nbsp;<span style="font-weight:400;opacity:0.45;">DP</span>
    </a>

    <button
      class="nav-trigger"
      aria-expanded="false"
      aria-controls="nav-overlay"
      aria-label="Open menu"
    >
      <span class="nav-trigger__line"></span>
      <span class="nav-trigger__line"></span>
    </button>
  </header>


  <!-- ============================================================
       NAV OVERLAY
  ============================================================ -->
  <nav
    class="nav-overlay"
    id="nav-overlay"
    aria-label="Main navigation"
    role="dialog"
    aria-modal="true"
  >
    <button class="nav-close" aria-label="Close menu">✕</button>

    <ul class="nav-list" role="list">
      <li><a href="index.html"  class="nav-link" aria-current="page">Home</a></li>
      <li><a href="work.html"   class="nav-link">Work</a></li>
      <li><a href="about.html"  class="nav-link">About</a></li>
    </ul>
  </nav>


  <!-- ============================================================
       MAIN
  ============================================================ -->
  <main class="site-main site-main--hero" id="main-content">


    <!-- HERO -------------------------------------------------- -->
    <section class="hero" aria-label="Showreel">

      <!-- Poster + play facade: tap/click loads Vimeo player inline -->
      <!-- Poster image set by JS (assets/images/showreel-poster.jpg → oembed fallback) -->
      <button class="vimeo-facade"
              data-src="https://player.vimeo.com/video/1182882079?autoplay=1&title=0&byline=0&portrait=0"
              data-title="Da'anong Gyang — Showreel"
              aria-label="Play Da'anong Gyang showreel">
        <img src=""
             alt="Da'anong Gyang showreel poster"
             width="1920" height="1080" />
        <span class="vimeo-facade__play" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5.14v14l11-7-11-7z"/>
          </svg>
        </span>
      </button>

    </section>
    <!-- /HERO -->


    <!-- WORK PREVIEW ------------------------------------------ -->
    <section class="work-preview" aria-labelledby="work-preview-label">

      <div class="work-preview__header reveal">
        <span class="work-preview__label" id="work-preview-label">Selected Work</span>
        <a href="work.html" class="work-preview__cta">
          View all <span aria-hidden="true">→</span>
        </a>
      </div>

      <!-- Card Stack -->
      <div class="card-stack reveal-stagger">

        <!-- Card 1 -->
        <a href="work/silence-of-the-harmattan.html" class="card">
          <img
            src="https://images.unsplash.com/photo-1594389615558-fcd4a68e5b28?w=1440&h=630&fit=crop&crop=center&q=80"
            alt="Silence of the Harmattan — vast desert landscape at golden hour"
            class="card__image"
            width="1440"
            height="630"
            loading="eager"
          />
          <div class="card__overlay">
            <span class="card__category">Documentary</span>
            <h2 class="card__title">Silence of the Harmattan</h2>
          </div>
        </a>

        <!-- Card 2 -->
        <a href="work/between-two-rivers.html" class="card">
          <img
            src="https://images.unsplash.com/photo-1517854980576-a42cc418a958?w=1440&h=630&fit=crop&crop=center&q=80"
            alt="Between Two Rivers — aerial view of winding river through forest"
            class="card__image"
            width="1440"
            height="630"
            loading="lazy"
          />
          <div class="card__overlay">
            <span class="card__category">Feature Film</span>
            <h2 class="card__title">Between Two Rivers</h2>
          </div>
        </a>

        <!-- Card 3 -->
        <a href="work/no-fixed-address.html" class="card">
          <img
            src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1440&h=630&fit=crop&crop=bottom&q=80"
            alt="No Fixed Address — urban night scene with neon reflections"
            class="card__image"
            width="1440"
            height="630"
            loading="lazy"
          />
          <div class="card__overlay">
            <span class="card__category">Short Film</span>
            <h2 class="card__title">No Fixed Address</h2>
          </div>
        </a>

        <!-- Card 4 -->
        <a href="work/atlas-campaign.html" class="card">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1440&h=630&fit=crop&crop=center&q=80"
            alt="Atlas Campaign — deep forest light rays through tall trees"
            class="card__image"
            width="1440"
            height="630"
            loading="lazy"
          />
          <div class="card__overlay">
            <span class="card__category">Commercial</span>
            <h2 class="card__title">Atlas Campaign</h2>
          </div>
        </a>

      </div>
      <!-- /Card Stack -->

    </section>
    <!-- /WORK PREVIEW -->


    <!-- HOME CTA ---------------------------------------------- -->
    <section class="home-cta section" aria-labelledby="cta-heading">
      <div class="container">
        <div class="home-cta__inner reveal">
          <p class="home-cta__text" id="cta-heading">
            Available for feature, documentary<br>and commercial projects.
          </p>
          <a href="about.html#contact" class="home-cta__link">
            Get in touch
            <span class="home-cta__link-arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </section>
    <!-- /HOME CTA -->


  </main>


  <!-- Shared JS -->
  <script src="site.js?v=2" defer></script>

</body>
</html>
