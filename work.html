<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Da'anong Gyang — Work. A complete catalogue of cinematography across documentary, feature film, commercial, and short form." />
  <title>Work — Da'anong Gyang DP</title>

  <link rel="dns-prefetch" href="https://www.youtube.com" />

  <link rel="stylesheet" href="DESIGN_SYSTEM.css?v=2" />
  <link rel="stylesheet" href="site.css?v=2" />

  <style>
    /* ============================================================
       work.css — Work page specific styles
       ============================================================ */


    /* ----------------------------------------------------------
       PAGE HEADER
    ---------------------------------------------------------- */

    .page-header {
      padding-top: calc(80px + var(--space-12));
      padding-bottom: var(--space-10);
      border-bottom: 1px solid var(--color-border);
    }

    .page-header__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-6);
      flex-wrap: wrap;
    }

    .page-header__title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      line-height: var(--line-height-tight);
    }

    .page-header__meta {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding-bottom: 4px; /* align to title baseline */
    }

    @media (max-width: 479px) {
      .page-header__title {
        font-size: var(--font-size-lg);
      }
    }


    /* ----------------------------------------------------------
       FILTER BAR
    ---------------------------------------------------------- */

    .filter-bar {
      padding-block: var(--space-6);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 80;
      background: var(--color-bg);
      /* Slight blur if content scrolls beneath */
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      transition: background var(--duration-base) var(--ease-out),
                  backdrop-filter var(--duration-base) var(--ease-out);
    }

    .filter-bar.is-sticky {
      background: var(--color-bg-overlay);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .filter-bar__inner {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-bar__inner::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--space-2) var(--space-4);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
      white-space: nowrap;
      border-radius: 2px;
      transition: color var(--duration-fast) var(--ease-out),
                  background var(--duration-fast) var(--ease-out);
      position: relative;
    }

    .filter-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: var(--space-4);
      right: var(--space-4);
      height: 1px;
      background: var(--color-text);
      transform: scaleX(0);
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .filter-btn:hover {
      color: var(--color-text);
    }

    .filter-btn.is-active {
      color: var(--color-text);
    }

    .filter-btn.is-active::after {
      transform: scaleX(1);
    }

    .filter-btn:focus-visible {
      outline: 1px solid var(--color-text);
      outline-offset: 2px;
    }


    /* ----------------------------------------------------------
       PROJECT STACK
    ---------------------------------------------------------- */

    .work-stack {
      padding-bottom: var(--section-gap);
    }

    /* Cards that are hidden by filter */
    .card[data-hidden="true"] {
      display: none;
    }

    /* Count indicator */
    .work-stack__count {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-8);
      transition: opacity var(--duration-fast) var(--ease-out);
    }

    /* No-results state */
    .work-stack__empty {
      display: none;
      padding-block: var(--space-20);
      padding-inline: var(--container-pad);
      font-size: var(--font-size-sm);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .work-stack__empty.is-visible {
      display: block;
    }
  </style>
</head>

<body>

  <!-- ============================================================
       SITE HEADER
  ============================================================ -->
  <header class="site-header" role="banner">
    <a href="index.html" class="site-logo" aria-label="Da'anong Gyang — Home">
      Da'anong Gyang&nbsp;<span style="font-weight:400;opacity:0.45;">DP</span>
    </a>

    <button
      class="nav-trigger"
      aria-expanded="false"
      aria-controls="nav-overlay"
      aria-label="Open menu"
    >
      <span class="nav-trigger__line"></span>
      <span class="nav-trigger__line"></span>
    </button>
  </header>


  <!-- ============================================================
       NAV OVERLAY
  ============================================================ -->
  <nav
    class="nav-overlay"
    id="nav-overlay"
    aria-label="Main navigation"
    role="dialog"
    aria-modal="true"
  >
    <button class="nav-close" aria-label="Close menu">✕</button>

    <ul class="nav-list" role="list">
      <li><a href="index.html"  class="nav-link">Home</a></li>
      <li><a href="work.html"   class="nav-link" aria-current="page">Work</a></li>
      <li><a href="about.html"  class="nav-link">About</a></li>
    </ul>
  </nav>


  <!-- ============================================================
       MAIN
  ============================================================ -->
  <main class="site-main" id="main-content">


    <!-- PAGE HEADER ------------------------------------------- -->
    <section class="page-header">
      <div class="container">
        <div class="page-header__inner reveal">
          <h1 class="page-header__title">Work</h1>
          <span class="page-header__meta" id="project-count" aria-live="polite">8 Projects</span>
        </div>
      </div>
    </section>


    <!-- FILTER BAR -------------------------------------------- -->
    <div class="filter-bar" id="filter-bar" role="toolbar" aria-label="Filter projects by category">
      <div class="container">
        <div class="filter-bar__inner">

          <button
            class="filter-btn is-active"
            data-filter="all"
            aria-pressed="true"
          >All</button>

          <button
            class="filter-btn"
            data-filter="feature"
            aria-pressed="false"
          >Features</button>

          <button
            class="filter-btn"
            data-filter="commercial"
            aria-pressed="false"
          >Commercials</button>

        </div>
      </div>
    </div>


    <!-- PROJECT STACK ----------------------------------------- -->
    <section class="work-stack" aria-labelledby="work-stack-heading">

      <p class="sr-only" id="work-stack-heading">All projects</p>

      <!-- Card Stack — full bleed, edge to edge -->
      <div class="card-stack" id="card-stack">

        <!-- 1 -->
        <a
          href="work/finding-nina.html"
          class="card reveal"
          data-category="feature"
        >
          <img
            src="assets/images/finding-nina/still-01.WEBP"
            alt="Finding Nina — feature film by Famous Odion Iraoya"
            class="card__image"
            width="1440"
            height="630"
            loading="eager"
          />
          <div class="card__overlay">
            <span class="card__category">Feature Film</span>
            <h2 class="card__title">Finding Nina</h2>
          </div>
        </a>

        <!-- 2 -->
        <a
          href="work/onobiren.html"
          class="card reveal"
          data-category="feature"
        >
          <img
            src="assets/images/onobiren/still-01.webp"
            alt="Onobiren — feature film by Famous Odion Iraoya"
            class="card__image"
            width="1440"
            height="630"
            loading="lazy"
          />
          <div class="card__overlay">
            <span class="card__category">Feature Film</span>
            <h2 class="card__title">Onobiren</h2>
          </div>
        </a>

        <!-- 3 -->
        <a
          href="work/mtv-shuga-psa.html"
          class="card reveal"
          data-category="commercial"
        >
          <img
            src="assets/images/mtv-shuga-psa/still-01.webp"
            alt="MTV Shuga PREP PSA — HIV prevention awareness film"
            class="card__image"
            width="1440"
            height="630"
            loading="lazy"
          />
          <div class="card__overlay">
            <span class="card__category">PSA</span>
            <h2 class="card__title">MTV Shuga PREP PSA</h2>
          </div>
        </a>

      </div>
      <!-- /card-stack -->

      <!-- Empty state (shown when filter returns 0 results) -->
      <p class="work-stack__empty" id="empty-state" role="status">
        No projects in this category yet.
      </p>

    </section>
    <!-- /PROJECT STACK -->


  </main>


  <!-- Shared JS -->
  <script src="site.js?v=2" defer></script>

  <script>
    /* ----------------------------------------------------------
       FILTER BAR
       Filters project cards by data-category attribute.
    ---------------------------------------------------------- */
    (function () {
      'use strict';

      var filterBtns  = document.querySelectorAll('.filter-btn');
      var cards       = document.querySelectorAll('#card-stack .card');
      var countEl     = document.getElementById('project-count');
      var emptyEl     = document.getElementById('empty-state');
      var filterBar   = document.getElementById('filter-bar');

      /* Sticky filter bar behaviour */
      var pageHeader = document.querySelector('.page-header');
      if (pageHeader && filterBar) {
        var stickyObserver = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            filterBar.classList.toggle('is-sticky', !entry.isIntersecting);
          });
        }, { threshold: 0 });
        stickyObserver.observe(pageHeader);
      }

      function applyFilter(filter) {
        var visible = 0;

        cards.forEach(function (card) {
          var cat = card.getAttribute('data-category');
          var show = filter === 'all' || cat === filter;
          card.setAttribute('data-hidden', show ? 'false' : 'true');
          if (show) visible++;
        });

        /* Update count */
        if (countEl) {
          countEl.textContent = visible + (visible === 1 ? ' Project' : ' Projects');
        }

        /* Empty state */
        if (emptyEl) {
          emptyEl.classList.toggle('is-visible', visible === 0);
        }
      }

      filterBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          /* Update button states */
          filterBtns.forEach(function (b) {
            b.classList.remove('is-active');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('is-active');
          btn.setAttribute('aria-pressed', 'true');

          applyFilter(btn.getAttribute('data-filter'));
        });
      });

      /* Initialise count */
      applyFilter('all');
    }());
  </script>

</body>
</html>
